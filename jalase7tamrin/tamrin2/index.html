<!DOCTYPE html>
<html lang="fa">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>posts&comments</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">

    </div>
    <div id="result">

      <div id="comments"></div>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
