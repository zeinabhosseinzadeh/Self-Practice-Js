<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>flights</title>
    <link rel="stylesheet" href="style.css">
</head>
    <body>
        <div class="container">
            <h2>add ticket</h2>
            <input type="text" id="flightNum" placeholder="flight-Number">
            <input type="text" id="name" placeholder="passenger name">
            <select id="airline">
                <option value="iranAir">IRI Air</option>
                <option value="mahanAir"> Mahan Air</option>
                <option value="kishAir">KISH Air</option>
            </select>
            <button id="addBtn">Add ticket</button>
            <p id="message" class="success"></p>
            <button id="printBtn" class="print-btn">show flights list</button>
            <div id="ticketList"></div>
        </div>

        <script src="script.js"></script>
    </body>

    </html>


    <script src="script.js"></script>
</body>

</html>
